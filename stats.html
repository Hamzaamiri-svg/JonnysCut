<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonny's Cut — Erfolgszahlen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #0e0e12; --grey: #161619; --card: #13131a; --border: rgba(255,255,255,0.07); --white: #f0f0f5;
  --blue: #0057FF; --cyan: #00c8ff;
  --heading: 'Oswald', sans-serif; --display: 'Bebas Neue', Impact, sans-serif;
}
body { background: var(--dark); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 2.5rem 1.2rem; }
.box { max-width: 480px; margin: 0 auto; text-align: center; }
.logo { font-family: var(--display); font-size: 2.2rem; background: linear-gradient(90deg, var(--blue), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.4rem; }
.sub { font-size: 0.72rem; color: rgba(255,255,255,0.35); letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--heading); margin-bottom: 2rem; }
.stat-card { background: var(--card); border: 1px solid var(--border); padding: 1.6rem; margin-bottom: 1rem; }
.stat-num { font-family: var(--display); font-size: 3rem; line-height: 1; color: var(--cyan); }
.stat-label { font-family: var(--heading); font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 0.4rem; }

.year-nav { display: flex; align-items: center; justify-content: center; gap: 1.2rem; margin: 2rem 0 1rem; }
.year-nav button { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--white); width: 34px; height: 34px; font-size: 1.1rem; cursor: pointer; border-radius: 4px; }
.year-nav button:hover { background: var(--blue); border-color: var(--blue); }
.year-title { font-family: var(--display); font-size: 1.6rem; min-width: 90px; }

.month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; text-align: left; }
.month-btn { background: var(--card); border: 1px solid var(--border); padding: 0.9rem 0.6rem; text-align: center; cursor: pointer; transition: all 0.15s; }
.month-btn:hover { border-color: var(--blue); background: rgba(0,87,255,0.08); }
.month-btn.selected { border-color: var(--cyan); background: rgba(0,200,255,0.1); }
.month-btn-name { font-family: var(--heading); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
.month-btn-num { font-family: var(--display); font-size: 1.5rem; color: var(--white); margin-top: 0.2rem; }

.selected-detail { background: var(--card); border: 1px solid var(--cyan); padding: 1.4rem; margin-top: 1.2rem; display: none; }
.selected-detail.show { display: block; }
.selected-detail-num { font-family: var(--display); font-size: 2.4rem; color: var(--cyan); }
.selected-detail-label { font-family: var(--heading); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 0.3rem; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Jonny's Cut</div>
  <div class="sub">Unsere Erfolgszahlen</div>

  <div class="stat-card">
    <div class="stat-num" id="statMonth">–</div>
    <div class="stat-label" id="statMonthLabel">Termine diesen Monat</div>
  </div>

  <div class="stat-card">
    <div class="stat-num" id="statYear">–</div>
    <div class="stat-label" id="statYearLabel">Termine dieses Jahr</div>
  </div>

  <div class="stat-card">
    <div class="stat-num" id="statAllTime">–</div>
    <div class="stat-label">Termine insgesamt</div>
  </div>

  <div class="year-nav">
    <button onclick="changeYear(-1)">‹</button>
    <div class="year-title" id="calYearTitle"></div>
    <button onclick="changeYear(1)">›</button>
  </div>

  <div class="month-grid" id="monthGrid"></div>

  <div class="selected-detail" id="selectedDetail">
    <div class="selected-detail-num" id="selectedDetailNum">0</div>
    <div class="selected-detail-label" id="selectedDetailLabel"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAXcUYg35hcQKBRZYa8NmU_a8EBKtApLdE",
  authDomain: "jonny-s-cut.firebaseapp.com",
  databaseURL: "https://jonny-s-cut-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "jonny-s-cut",
  storageBucket: "jonny-s-cut.firebasestorage.app",
  messagingSenderId: "1070305082396",
  appId: "1:1070305082396:web:2ca5c5cd311973f1d3b3d9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const monthsShort = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const now = new Date();
const thisMonthKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
const thisYearKey = String(now.getFullYear());

document.getElementById('statMonthLabel').textContent = 'Termine im ' + months[now.getMonth()];
document.getElementById('statYearLabel').textContent = 'Termine ' + thisYearKey;

async function successCount(path) {
  const snap = await get(ref(db, path));
  const data = snap.exists() ? snap.val() : {};
  return Math.max(0, (data.created || 0) - (data.cancelled || 0));
}

async function loadStat(path, elId) {
  document.getElementById(elId).textContent = await successCount(path);
}

loadStat('stats/monthly/' + thisMonthKey, 'statMonth');
loadStat('stats/yearly/' + thisYearKey, 'statYear');
loadStat('stats/allTime', 'statAllTime');

// ── Jahres-Kalender mit Monaten ──
let calYear = now.getFullYear();
let selectedMonthIdx = null;

async function renderCalendar() {
  document.getElementById('calYearTitle').textContent = calYear;
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';

  const yearTotal = await successCount('stats/yearly/' + calYear);

  for (let m = 0; m < 12; m++) {
    const mKey = calYear + '-' + String(m+1).padStart(2,'0');
    const count = await successCount('stats/monthly/' + mKey);
    const btn = document.createElement('div');
    btn.className = 'month-btn' + (selectedMonthIdx === m ? ' selected' : '');
    btn.innerHTML = `<div class="month-btn-name">${monthsShort[m]}</div><div class="month-btn-num">${count}</div>`;
    btn.onclick = () => selectMonth(m, count);
    grid.appendChild(btn);
  }

  if (selectedMonthIdx === null) {
    document.getElementById('selectedDetail').classList.remove('show');
  } else {
    showDetail(months[selectedMonthIdx], await successCount('stats/monthly/' + calYear + '-' + String(selectedMonthIdx+1).padStart(2,'0')));
  }
}

function selectMonth(m, count) {
  selectedMonthIdx = m;
  showDetail(months[m], count);
  renderCalendar();
}

function showDetail(monthName, count) {
  document.getElementById('selectedDetail').classList.add('show');
  document.getElementById('selectedDetailNum').textContent = count;
  document.getElementById('selectedDetailLabel').textContent = 'Erfolgreiche Termine im ' + monthName + ' ' + calYear;
}

window.changeYear = function(delta) {
  calYear += delta;
  selectedMonthIdx = null;
  renderCalendar();
};

renderCalendar();
</script>
</body>
</html>
